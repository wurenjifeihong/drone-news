<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无人机影像标注工具</title>
<style>
:root{--bg:#1e1e2e;--panel:#252536;--border:#3a3a50;--text:#cdd6f4;--text2:#a6adc8;--accent:#89b4fa;--yellow:#f9e2af;--red:#f38ba8;--green:#a6e3a1;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
#navbar{display:flex;gap:0;padding:0 14px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;z-index:11}
.nav-tab{padding:8px 24px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;background:transparent}
.nav-tab:hover{color:var(--text);background:#252536}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
#toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;flex-wrap:wrap}
#toolbar .sep{width:1px;height:24px;background:var(--border);margin:0 4px}
#plan-selector{display:inline-flex;align-items:center;gap:4px}#plan-select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:4px 8px;font-size:12px;cursor:pointer;min-width:100px}#plan-select option{background:var(--panel);color:var(--text)}
#toolbar .spacer{flex:1}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:#313148;border-color:#585878}
.btn.active{background:var(--accent);color:#1e1e2e;border-color:var(--accent)}
.btn.accent{background:var(--accent);color:#1e1e2e;border-color:var(--accent)}
.btn.accent:hover{opacity:.85}
.btn.magic{background:#a6e3a1;color:#1e1e2e;border-color:#a6e3a1}
.btn.magic:hover{opacity:.85}
.btn.off{background:var(--red);color:#1e1e2e;border-color:var(--red);opacity:.7}
.btn .icon{font-size:16px;line-height:1}
#picked-preview{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid var(--accent);border-radius:6px;font-size:12px;color:var(--text);min-width:110px;background:var(--bg)}
#picked-preview .sw{width:20px;height:20px;border-radius:3px;border:1px solid rgba(255,255,255,.4);flex-shrink:0}
#picked-preview .hex{font-family:monospace;color:var(--accent);font-weight:600}
.picked-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 6px;background:#313148;border-radius:4px;position:relative}.picked-chip .sw{width:16px;height:16px;border-radius:2px;border:1px solid rgba(255,255,255,.3);flex-shrink:0}.picked-chip .hex{font-family:monospace;font-size:11px;color:var(--accent)}.picked-chip .del{font-size:14px;color:var(--red);cursor:pointer;line-height:1;padding:0 2px}.picked-chip .del:hover{color:#ff6b8a}
#color-picker-wrap{position:relative;display:inline-flex;align-items:center}
#btn-color{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);cursor:pointer;font-size:13px;color:var(--text)}
#btn-color:hover{background:#313148}
#btn-color .swatch{display:inline-block;width:18px;height:18px;border-radius:4px;border:2px solid rgba(255,255,255,.3);flex-shrink:0}
#color-popover{position:absolute;top:100%;left:0;margin-top:6px;padding:10px;background:#2d2d44;border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 2px 12px rgba(0,0,0,.3);display:none;flex-direction:column;gap:10px;z-index:100;min-width:200px}
#color-popover.show{display:flex}
#color-popover .color-row{display:flex;gap:6px;flex-wrap:wrap}
#color-popover .color-dot{width:26px;height:26px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:all .12s}
#color-popover .color-dot:hover{transform:scale(1.15)}
#color-popover .color-dot.active-color{border-color:#fff;box-shadow:0 0 8px currentColor}
#color-popover .custom-row{display:flex;align-items:center;gap:8px}
#color-popover .custom-row label{font-size:12px;color:var(--text2)}
#color-input{width:30px;height:26px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:transparent;padding:0}
#color-popover .apply-btn{padding:4px 10px;border:1px solid var(--accent);border-radius:4px;background:transparent;color:var(--accent);cursor:pointer;font-size:11px}
#color-popover .apply-btn:hover{background:var(--accent);color:#1e1e2e}
.tolerance-wrap{display:inline-flex;align-items:center;gap:6px}
.tolerance-wrap label{font-size:12px;color:var(--text2)}
#tolerance-slider{width:80px;accent-color:var(--accent)}
#tolerance-val{font-size:12px;color:var(--accent);font-weight:600;min-width:28px}
#main{display:flex;flex:1;overflow:hidden}
#sidebar{width:240px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
#sidebar.hidden{display:none}
.section-header{padding:8px 14px;font-size:12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;cursor:pointer}
.section-header:hover{background:#2d2d44}
.section-header .arrow{font-size:10px;transition:transform .2s}
.section-header.collapsed .arrow{transform:rotate(-90deg)}
#image-list{overflow-y:auto;max-height:40%}
#image-list.collapsed{display:none}
.thumb-item{display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:12px;border-left:3px solid transparent}
.thumb-item:hover{background:#2d2d44}
.thumb-item.current{background:#2a2a44;border-left-color:var(--accent)}
.thumb-item .thumb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.thumb-item .thumb-dot.done{background:var(--green)}
.thumb-item .thumb-dot.empty{background:var(--border)}
.thumb-item .thumb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.thumb-item .thumb-badge{font-size:10px;padding:2px 6px;border-radius:10px;background:#3a3a50;color:var(--text2)}
#layer-list{flex:1;overflow-y:auto}
#layer-list.collapsed{display:none}
.layer-item{display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:12px;border-left:3px solid transparent;transition:all .12s}
.layer-item:hover{background:#2d2d44}
.layer-item.selected{background:#2a2a44;border-left-color:var(--accent)}
.layer-item .layer-swatch{width:14px;height:14px;border-radius:3px;border:1px solid rgba(255,255,255,.3);flex-shrink:0}
.layer-item .layer-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.layer-item .layer-eye{font-size:14px;opacity:.6;cursor:pointer;flex-shrink:0}
.layer-item .layer-eye:hover{opacity:1}
.layer-item .layer-eye.hidden{opacity:.25}
#layer-actions{display:flex;gap:6px;padding:8px 14px;border-top:1px solid var(--border);flex-shrink:0}
#layer-actions .btn{padding:4px 10px;font-size:11px}
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:#11111b}
canvas{position:absolute;top:0;left:0}
#drop-hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text2);font-size:15px;pointer-events:none}
#drop-hint .big-icon{font-size:56px;opacity:.4}
#drop-hint.hidden{display:none}
#statusbar{display:flex;align-items:center;gap:16px;padding:5px 14px;background:var(--panel);border-top:1px solid var(--border);font-size:12px;color:var(--text2);flex-shrink:0}
#statusbar span{display:flex;align-items:center;gap:5px}
#statusbar .val{color:var(--text);font-weight:500}
#toast{position:fixed;bottom:48px;left:50%;transform:translateX(-50%);background:#313148;color:var(--text);padding:8px 20px;border-radius:20px;font-size:13px;box-shadow:0 2px 12px rgba(0,0,0,.3);opacity:0;transition:opacity .25s;pointer-events:none;z-index:99}
#toast.show{opacity:1}
#magnifier{position:fixed;border:2px solid var(--accent);border-radius:50%;pointer-events:none;z-index:200;display:none;box-shadow:0 0 12px rgba(0,0,0,.5)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>

<div id="navbar"><div class="nav-tab active" id="nav-konggu">🔨 空鼓检查</div><div class="nav-tab" id="nav-liefeng">🔍 裂缝检查</div></div><div id="toolbar">
<button class="btn" id="btn-load"><span class="icon">📁</span> 加载</button>

<button class="btn" id="btn-eyedropper">💉 吸管</button><span id="picked-preview"><span class="sw" id="picked-swatch" style="background-color:#555"></span><span class="hex" id="picked-hex">未取色</span></span><button class="btn" id="btn-autoselect">🪄 自动框选</button><button class="btn" id="btn-ai-select">🤖 AI框选</button><button class="btn" id="btn-erase">🧹 擦除</button><span class="sep"></span><button class="btn" id="btn-ai-detect" style="background:#a6e3a1;color:#1e1e2e;border-color:#a6e3a1">🔍 AI识别</button><span class="sep"></span><span id="plan-selector"><select id="plan-select"><option value="">-- 选择方案 --</option></select><button class="btn" id="btn-save-plan" title="保存当前框选参数为方案">💾 保存方案</button><button class="btn" id="btn-batch" title="对当前图片应用选中方案">▶️ 批量框选</button><button class="btn" id="btn-del-plan" title="删除选中方案">🗑️</button></span>

<span class="sep"></span>

<button id="btn-color"><span class="swatch" id="active-swatch" style="background:#f9e2af"></span>颜色 ▾</button>
<div id="color-popover"><div class="color-row" id="preset-colors"></div><div class="custom-row"><label>自定义:</label><input type="color" id="color-input" value="#f9e2af"><button class="apply-btn" id="btn-apply-color">应用到选中</button></div></div>

<span class="sep"></span>
<button class="btn" id="btn-zoomin">🔍+</button><button class="btn" id="btn-zoomout">🔍-</button><button class="btn" id="btn-fit">适应</button>

<button class="btn accent" id="btn-export">💾 导出JSON</button><button class="btn accent" id="btn-export-img">🖼️ 导出图片</button><button class="btn accent" id="btn-batch-export">📦 批量导出</button>

</div>

</div>

</div>

<script>
"use strict";
const PRESET_COLORS=["#f9e2af","#fab387","#f38ba8","#cba6f7","#89b4fa","#94e2d5","#a6e3a1","#f5c2e7","#ffffff","#ff79c6","#50fa7b","#8be9fd"];
const state={images:[],currentIdx:-1,polygons:[],currentPoly:null,selectedIndices:[],mode:"draw",activeColor:"#f9e2af",tolerance:25,zoom:1,panX:0,panY:0,panning:!1,panStart:{x:0,y:0},panStartPX:0,panStartPY:0,hoveredVertex:null,hoveredPoly:void 0,eraseRect:null,dragVertex:null,imageDataCache:null,_autoSelectNext:!1,showOutlines:!0,showLabels:!0,lineWidth:3,currentTab:"空鼓检查",isDirty:!1,pickedColors:[],plans:loadPlanStore(),planImages:[]};
const canvas=document.getElementById("canvas"),ctx=canvas.getContext("2d"),wrap=document.getElementById("canvas-wrap");
const sidebar=document.getElementById("sidebar"),imageList=document.getElementById("image-list"),layerList=document.getElementById("layer-list");
const magnifier=document.getElementById("magnifier"),mctx=magnifier.getContext("2d");
function clamp(v,l,h){return Math.max(l,Math.min(h,v))}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function screenToImage(sx,sy){return{x:(sx-state.panX)/state.zoom,y:(sy-state.panY)/state.zoom}}
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show")},1800)}
function rgbToHex(r,g,b){return"#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1)}
function colorDistance(c1,c2){var rmean=(c1.r+c2.r)/2,dr=c1.r-c2.r,dg=c1.g-c2.g,db=c1.b-c2.b;return Math.sqrt((2+rmean/256)*dr*dr+4*dg*dg+(2+(255-rmean)/256)*db*db)}

// ===== 颜色选择器 =====
function buildColorPalette(){var c=document.getElementById("preset-colors");c.innerHTML="";PRESET_COLORS.forEach(function(clr){var d=document.createElement("div");d.className="color-dot";d.style.backgroundColor=clr;d.title=clr;if(clr===state.activeColor)d.classList.add("active-color");d.addEventListener("click",function(){selectColor(clr)});c.appendChild(d)})}
function selectColor(clr){state.activeColor=clr;document.getElementById("active-swatch").style.background=clr;document.getElementById("color-input").value=clr;buildColorPalette();if(state.selectedIndices.length>0){state.selectedIndices.forEach(function(i){state.polygons[i].color=clr});rebuildLayerPanel();render()}else if(state.mode==="edit"&&state.selectedIndices.length===0&&state.polygons.length>0&&state.hoveredPoly!==void 0){var pi=state.hoveredPoly;if(pi>=0){state.polygons[pi].color=clr;state.selectedIndices=[pi];rebuildLayerPanel();render()}}}
function applyColorToSelected(){if(state.selectedIndices.length>0){state.selectedIndices.forEach(function(i){state.polygons[i].color=state.activeColor});rebuildLayerPanel();render();showToast("已更新 "+state.selectedIndices.length+" 个线框")}else{showToast("请先选中线框")}}
document.getElementById("btn-color").addEventListener("click",function(e){e.stopPropagation();document.getElementById("color-popover").classList.toggle("show");buildColorPalette()});
document.getElementById("color-input").addEventListener("input",function(e){selectColor(e.target.value)});
document.getElementById("btn-apply-color").addEventListener("click",applyColorToSelected);
document.addEventListener("click",function(e){if(!document.getElementById("color-picker-wrap").contains(e.target))document.getElementById("color-popover").classList.remove("show")});
document.getElementById("tolerance-slider").addEventListener("input",function(){state.tolerance=parseInt(this.value);document.getElementById("tolerance-val").textContent=state.tolerance});document.getElementById("linewidth-slider").addEventListener("input",function(){state.lineWidth=parseInt(this.value);document.getElementById("linewidth-val").textContent=state.lineWidth;render()});

// ===== 像素读取 & 吸管 =====
function getPixelColor(ix,iy){if(!state.imageDataCache)return null;var w=state.images[state.currentIdx].width,idx=(Math.floor(iy)*w+Math.floor(ix))*4;if(idx<0||idx>=state.imageDataCache.data.length-3)return null;return{r:state.imageDataCache.data[idx],g:state.imageDataCache.data[idx+1],b:state.imageDataCache.data[idx+2]}}
function rebuildPickedPreview(){var pp=document.getElementById("picked-preview");if(!pp)return;pp.innerHTML="";if(state.pickedColors.length===0){pp.innerHTML='<span class="sw" id="picked-swatch" style="background-color:#555"></span><span class="hex" id="picked-hex">未取色</span>';return}state.pickedColors.forEach(function(c,i){var chip=document.createElement("span");chip.className="picked-chip";chip.innerHTML='<span class="sw" style="background-color:'+c.hex+'"></span><span class="hex">'+c.hex+'</span><span class="del" data-idx="'+i+'" title="删除">×</span>';chip.querySelector(".del").addEventListener("click",function(e){e.stopPropagation();state.pickedColors.splice(i,1);rebuildPickedPreview()});pp.appendChild(chip)})}
function eyedropperPick(sx,sy){var img=state.images[state.currentIdx];if(!img)return;var pt=screenToImage(sx,sy);if(pt.x<0||pt.y<0||pt.x>=img.width||pt.y>=img.height)return;var tc=document.createElement("canvas");tc.width=img.width;tc.height=img.height;var tctx=tc.getContext("2d");tctx.drawImage(img.element,0,0);try{state.imageDataCache=tctx.getImageData(0,0,img.width,img.height)}catch(e){}var clr=getPixelColor(pt.x,pt.y);if(clr){var hex=rgbToHex(clr.r,clr.g,clr.b);var exists=state.pickedColors.some(function(c){return c.hex===hex});if(!exists){state.pickedColors.push({r:clr.r,g:clr.g,b:clr.b,hex:hex});selectColor(hex);rebuildPickedPreview();showToast("吸取: "+hex)}else{showToast("颜色已存在: "+hex)}}setMode("draw")}
function updateMagnifier(e){if(state.mode!=="eyedropper"||state.currentIdx<0){magnifier.style.display="none";return}var rect=canvas.getBoundingClientRect(),sx=e.clientX-rect.left,sy=e.clientY-rect.top,pt=screenToImage(sx,sy),img=state.images[state.currentIdx];if(!img||pt.x<0||pt.y<0||pt.x>=img.width||pt.y>=img.height){magnifier.style.display="none";return}magnifier.style.display="block";magnifier.style.left=(e.clientX-60)+"px";magnifier.style.top=(e.clientY-120)+"px";mctx.clearRect(0,0,100,100);mctx.drawImage(img.element,pt.x-10,pt.y-10,20,20,0,0,100,100);mctx.strokeStyle="#fff";mctx.lineWidth=1;mctx.beginPath();mctx.moveTo(50,0);mctx.lineTo(50,100);mctx.stroke();mctx.beginPath();mctx.moveTo(0,50);mctx.lineTo(100,50);mctx.stroke();mctx.strokeStyle="#000";mctx.lineWidth=2;mctx.strokeRect(46,46,8,8)}

// ===== 自动框选 =====
function colorMatchesAny(clr,tol,colors){for(var i=0;i<colors.length;i++){if(colorDistance(clr,colors[i])<=tol)return!0}return!1}
function rgbToGray(data,w,h){var g=new Float32Array(w*h);for(var i=0;i<w*h;i++){var j=i*4;g[i]=0.299*data[j]+0.587*data[j+1]+0.114*data[j+2]}return g}
function gaussBlur(gray,w,h){var b=new Float32Array(w*h),k=[1,4,7,4,1,4,16,26,16,4,7,26,41,26,7,4,16,26,16,4,1,4,7,4,1],ks=5,kh=2,sum=273;for(var y=kh;y<h-kh;y++){for(var x=kh;x<w-kh;x++){var v=0;for(var ky=0;ky<ks;ky++){for(var kx=0;kx<ks;kx++){v+=gray[(y+ky-kh)*w+(x+kx-kh)]*k[ky*ks+kx]}}b[y*w+x]=v/sum}}return b}

function aiSelectAll(){var img=state.images[state.currentIdx];if(!img)return;var tol=state.tolerance,seeds=state.pickedColors,dilateR=Math.max(3,Math.floor(tol/4)),mr=createColorMask(tol,seeds);if(!mr)return;var dilated=dilateMask(mr.mask,mr.w,mr.h,dilateR),boundaries=extractBoundariesFromMask(dilated,mr.w,mr.h,30),added=0;boundaries.forEach(function(bd){var smoothed=simplifyPoints(bd,1.5);var poly={points:smoothed,color:state.activeColor,name:"AI区域 "+(state.polygons.length+1),visible:!0,nodots:!0};state.polygons.push(poly);added++});if(added>0){state.selectedIndices=[];for(var j=state.polygons.length-added;j<state.polygons.length;j++)state.selectedIndices.push(j);state.isDirty=!0}rebuildLayerPanel();updateStatus();render();setMode("edit");showToast("AI框选完成: "+added+" 个区域")}function savePlanStore(){try{localStorage.setItem("dj_plans",JSON.stringify(state.plans))}catch(e){}}function loadPlanStore(){try{var d=localStorage.getItem("dj_plans");return d?JSON.parse(d):[]}catch(e){return[]}}function rebuildPlanSelector(){var sel=document.getElementById("plan-select");if(!sel)return;sel.innerHTML='<option value="">-- 选择方案 --</option>';state.plans.forEach(function(p,i){var tag=p.mode==="auto"?"[自动]":"[AI]";sel.innerHTML+='<option value="'+i+'">'+tag+' '+p.name+'</option>'})}function savePlan(){var name=prompt("方案名称:","方案 "+(state.plans.length+1));if(!name)return;var m=prompt("框选模式:\n1 = 自动框选(矩形)\n2 = AI框选(平滑)","2");var mode=m==="1"?"auto":"ai";var plan={name:name,pickedColors:state.pickedColors.slice(),tolerance:state.tolerance,lineWidth:state.lineWidth,lineColor:state.activeColor,mode:mode};state.plans.push(plan);savePlanStore();rebuildPlanSelector();showToast("方案已保存: "+name+" ["+(mode==="auto"?"自动":"AI")+"]")}function deletePlan(idx){state.plans.splice(idx,1);savePlanStore();rebuildPlanSelector();showToast("方案已删除")}function batchProcess(){var sel=document.getElementById("plan-select");if(!sel||sel.value===""){showToast("请先选择方案");return}var plan=state.plans[parseInt(sel.value)];if(!plan){showToast("方案无效");return}if(state.images.length===0){showToast("请先加载图片");return}var targets=[];state.images.forEach(function(_,i){targets.push(i)});if(targets.length===0){showToast("无图片可处理");return}var modeLabel=plan.mode==="auto"?"自动":"AI";showToast("批量"+modeLabel+"框选 "+targets.length+" 张...");var origIdx=state.currentIdx,idx=0,processed=0;function next(){if(idx>=targets.length){switchToImage(origIdx||0);rebuildLayerPanel();updateStatus();render();showToast("批量框选完成: "+processed+"/"+targets.length+" 张");return}var ti=targets[idx];switchToImage(ti);setTimeout(function(){if(!state.imageDataCache){cacheImageData()}if(!state.imageDataCache){idx++;next();return}state.tolerance=plan.tolerance;state.lineWidth=plan.lineWidth;state.activeColor=plan.lineColor;state.pickedColors=plan.pickedColors.slice();document.getElementById("active-swatch").style.background=plan.lineColor;document.getElementById("color-input").value=plan.lineColor;buildColorPalette();document.getElementById("tolerance-slider").value=plan.tolerance;document.getElementById("tolerance-val").textContent=plan.tolerance;document.getElementById("linewidth-slider").value=plan.lineWidth;document.getElementById("linewidth-val").textContent=plan.lineWidth;rebuildPickedPreview();var mr=createColorMask(plan.tolerance,plan.pickedColors);if(!mr){saveCurrentAnnotations();idx++;next();return}var dilateR=Math.max(3,Math.floor(plan.tolerance/4));var dilated=dilateMask(mr.mask,mr.w,mr.h,dilateR);var imAdd=0;if(plan.mode==="ai"){var boundaries=extractBoundariesFromMask(dilated,mr.w,mr.h,30);boundaries.forEach(function(bd){var smoothed=simplifyPoints(bd,1.5);state.polygons.push({points:smoothed,color:plan.lineColor,name:"批量AI "+(state.polygons.length+1),visible:!0,nodots:!0});imAdd++})}else{var rects=mergeOverlappingRects(extractRectsFromMask(dilated,mr.w,mr.h,30));rects.forEach(function(r){var w=r.maxX-r.minX,h=r.maxY-r.minY;if(w<3||h<3)return;if(isOverlapping(r,state.polygons))return;state.polygons.push({points:[{x:r.minX,y:r.minY},{x:r.maxX,y:r.minY},{x:r.maxX,y:r.maxY},{x:r.minX,y:r.maxY}],color:plan.lineColor,name:"批量区域 "+(state.polygons.length+1),type:"rect",visible:!0});imAdd++})}if(imAdd>0)state.isDirty=!0;saveCurrentAnnotations();rebuildLayerPanel();updateStatus();render();processed++;idx++;next()},300)}next()}
function aiDetectObjects(){var img=state.images[state.currentIdx];if(!img){showToast("请先加载图片");return}showToast("AI识别中...");setTimeout(function(){var t0=Date.now(),maxDim=800,scale=1,oriW=img.width,oriH=img.height;if(Math.max(oriW,oriH)>maxDim){scale=maxDim/Math.max(oriW,oriH)}var sw=Math.floor(oriW*scale),sh=Math.floor(oriH*scale),tc=document.createElement("canvas");tc.width=oriW;tc.height=oriH;var tctx=tc.getContext("2d");tctx.drawImage(img.element,0,0);var od;try{od=tctx.getImageData(0,0,oriW,oriH)}catch(e){showToast("图片过大");return}var sd=document.createElement("canvas");sd.width=sw;sd.height=sh;var sctx=sd.getContext("2d");sctx.drawImage(tc,0,0,oriW,oriH,0,0,sw,sh);var sd2;try{sd2=sctx.getImageData(0,0,sw,sh)}catch(e){showToast("处理失败");return}var gray=rgbToGray(sd2.data,sw,sh),blur=gaussBlur(gray,sw,sh),edges=sobelEdges(blur,sw,sh),edgeBin=threshEdges(edges,sw,sh,0.12),regions=findConnectedRegions(edgeBin,sw,sh,40);var added=0,acCount=0,winCount=0;regions.forEach(function(r){var cls=classifyRegion(gray,edges,r,sw,sh);if(!cls)return;var ox0=Math.floor(r.minX/scale),oy0=Math.floor(r.minY/scale),ox1=Math.floor(r.maxX/scale),oy1=Math.floor(r.maxY/scale);var col=cls.type==="ac"?"#f38ba8":"#89b4fa",lbl=cls.type==="ac"?"空调外机":"窗户",name=lbl+" "+(state.polygons.length+1);var poly={points:[{x:ox0,y:oy0},{x:ox1,y:oy0},{x:ox1,y:oy1},{x:ox0,y:oy1}],color:col,name:name,type:"rect",visible:!0,aiType:cls.type};state.polygons.push(poly);if(cls.type==="ac")acCount++;else winCount++;added++});if(added>0){state.selectedIndices=[];for(var j=state.polygons.length-added;j<state.polygons.length;j++)state.selectedIndices.push(j);state.isDirty=!0}rebuildLayerPanel();updateStatus();render();setMode("edit");showToast("热成像识别: 高温目标"+acCount+" 低温目标"+winCount+" ("+(Date.now()-t0)+"ms)")},30)}
rebuildPlanSelector();
