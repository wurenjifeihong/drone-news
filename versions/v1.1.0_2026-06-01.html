<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无人机影像标注工具</title>
<style>
:root{--bg:#1e1e2e;--panel:#252536;--border:#3a3a50;--text:#cdd6f4;--text2:#a6adc8;--accent:#89b4fa;--yellow:#f9e2af;--red:#f38ba8;--green:#a6e3a1;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
#navbar{display:flex;gap:0;padding:0 14px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;z-index:11}
.nav-tab{padding:8px 24px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;background:transparent}
.nav-tab:hover{color:var(--text);background:#252536}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
#toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;flex-wrap:wrap}
#toolbar .sep{width:1px;height:24px;background:var(--border);margin:0 4px}
#toolbar .spacer{flex:1}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:#313148;border-color:#585878}
.btn.active{background:var(--accent);color:#1e1e2e;border-color:var(--accent)}
.btn.accent{background:var(--accent);color:#1e1e2e;border-color:var(--accent)}
.btn.accent:hover{opacity:.85}
.btn.magic{background:#a6e3a1;color:#1e1e2e;border-color:#a6e3a1}
.btn.magic:hover{opacity:.85}
.btn.off{background:var(--red);color:#1e1e2e;border-color:var(--red);opacity:.7}
.btn .icon{font-size:16px;line-height:1}
#color-picker-wrap{position:relative;display:inline-flex;align-items:center}
#btn-color{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);cursor:pointer;font-size:13px;color:var(--text)}
#btn-color:hover{background:#313148}
#btn-color .swatch{display:inline-block;width:18px;height:18px;border-radius:4px;border:2px solid rgba(255,255,255,.3);flex-shrink:0}
#color-popover{position:absolute;top:100%;left:0;margin-top:6px;padding:10px;background:#2d2d44;border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 2px 12px rgba(0,0,0,.3);display:none;flex-direction:column;gap:10px;z-index:100;min-width:200px}
#color-popover.show{display:flex}
#color-popover .color-row{display:flex;gap:6px;flex-wrap:wrap}
#color-popover .color-dot{width:26px;height:26px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:all .12s}
#color-popover .color-dot:hover{transform:scale(1.15)}
#color-popover .color-dot.active-color{border-color:#fff;box-shadow:0 0 8px currentColor}
#color-popover .custom-row{display:flex;align-items:center;gap:8px}
#color-popover .custom-row label{font-size:12px;color:var(--text2)}
#color-input{width:30px;height:26px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:transparent;padding:0}
#color-popover .apply-btn{padding:4px 10px;border:1px solid var(--accent);border-radius:4px;background:transparent;color:var(--accent);cursor:pointer;font-size:11px}
#color-popover .apply-btn:hover{background:var(--accent);color:#1e1e2e}
.tolerance-wrap{display:inline-flex;align-items:center;gap:6px}
.tolerance-wrap label{font-size:12px;color:var(--text2)}
#tolerance-slider{width:80px;accent-color:var(--accent)}
#tolerance-val{font-size:12px;color:var(--accent);font-weight:600;min-width:28px}
#main{display:flex;flex:1;overflow:hidden}
#sidebar{width:240px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
#sidebar.hidden{display:none}
.section-header{padding:8px 14px;font-size:12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;cursor:pointer}
.section-header:hover{background:#2d2d44}
.section-header .arrow{font-size:10px;transition:transform .2s}
.section-header.collapsed .arrow{transform:rotate(-90deg)}
#image-list{overflow-y:auto;max-height:40%}
#image-list.collapsed{display:none}
.thumb-item{display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:12px;border-left:3px solid transparent}
.thumb-item:hover{background:#2d2d44}
.thumb-item.current{background:#2a2a44;border-left-color:var(--accent)}
.thumb-item .thumb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.thumb-item .thumb-dot.done{background:var(--green)}
.thumb-item .thumb-dot.empty{background:var(--border)}
.thumb-item .thumb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.thumb-item .thumb-badge{font-size:10px;padding:2px 6px;border-radius:10px;background:#3a3a50;color:var(--text2)}
#layer-list{flex:1;overflow-y:auto}
#layer-list.collapsed{display:none}
.layer-item{display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:12px;border-left:3px solid transparent;transition:all .12s}
.layer-item:hover{background:#2d2d44}
.layer-item.selected{background:#2a2a44;border-left-color:var(--accent)}
.layer-item .layer-swatch{width:14px;height:14px;border-radius:3px;border:1px solid rgba(255,255,255,.3);flex-shrink:0}
.layer-item .layer-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.layer-item .layer-eye{font-size:14px;opacity:.6;cursor:pointer;flex-shrink:0}
.layer-item .layer-eye:hover{opacity:1}
.layer-item .layer-eye.hidden{opacity:.25}
#layer-actions{display:flex;gap:6px;padding:8px 14px;border-top:1px solid var(--border);flex-shrink:0}
#layer-actions .btn{padding:4px 10px;font-size:11px}
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:#11111b}
canvas{position:absolute;top:0;left:0}
#drop-hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text2);font-size:15px;pointer-events:none}
#drop-hint .big-icon{font-size:56px;opacity:.4}
#drop-hint.hidden{display:none}
#statusbar{display:flex;align-items:center;gap:16px;padding:5px 14px;background:var(--panel);border-top:1px solid var(--border);font-size:12px;color:var(--text2);flex-shrink:0}
#statusbar span{display:flex;align-items:center;gap:5px}
#statusbar .val{color:var(--text);font-weight:500}
#toast{position:fixed;bottom:48px;left:50%;transform:translateX(-50%);background:#313148;color:var(--text);padding:8px 20px;border-radius:20px;font-size:13px;box-shadow:0 2px 12px rgba(0,0,0,.3);opacity:0;transition:opacity .25s;pointer-events:none;z-index:99}
#toast.show{opacity:1}
#magnifier{position:fixed;border:2px solid var(--accent);border-radius:50%;pointer-events:none;z-index:200;display:none;box-shadow:0 0 12px rgba(0,0,0,.5)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div id="navbar"><div class="nav-tab active" id="nav-konggu">🔨 空鼓检查</div><div class="nav-tab" id="nav-liefeng">🔍 裂缝检查</div></div><div id="toolbar">
<button class="btn" id="btn-load"><span class="icon">📁</span> 加载</button>
<button class="btn" id="btn-folder"><span class="icon">📂</span> 批量</button>
<span class="sep"></span>
<button class="btn active" id="btn-draw">✏️ 绘制</button>
<button class="btn" id="btn-edit">🖱️ 编辑</button>
<button class="btn" id="btn-eyedropper">💉 吸管</button>
<button class="btn magic" id="btn-autoselect">🪄 自动框选</button>
<button class="btn" id="btn-delete">🗑️ 删除</button>
<button class="btn" id="btn-undo">↩️ 撤销</button>
<span class="sep"></span>
<button class="btn active" id="btn-toggle-outline" title="显示/隐藏线框">📐 线框</button>
<button class="btn active" id="btn-toggle-label" title="显示/隐藏名称">🏷️ 名称</button>
<span class="sep"></span>
<div class="tolerance-wrap"><label>容差:</label><input type="range" id="tolerance-slider" min="0" max="100" value="25"><span id="tolerance-val">25</span></div><span class="sep"></span><div class="tolerance-wrap"><label>线宽:</label><input type="range" id="linewidth-slider" min="1" max="10" value="3"><span id="linewidth-val">3</span></div>
<span class="sep"></span>
<div id="color-picker-wrap">
<button id="btn-color"><span class="swatch" id="active-swatch" style="background:#f9e2af"></span>颜色 ▾</button>
<div id="color-popover"><div class="color-row" id="preset-colors"></div><div class="custom-row"><label>自定义:</label><input type="color" id="color-input" value="#f9e2af"><button class="apply-btn" id="btn-apply-color">应用到选中</button></div></div>
</div>
<span class="sep"></span>
<button class="btn" id="btn-zoomin">🔍+</button><button class="btn" id="btn-zoomout">🔍-</button><button class="btn" id="btn-fit">适应</button>
<span class="sep"></span>
<button class="btn accent" id="btn-export">💾 导出JSON</button><button class="btn accent" id="btn-export-img">🖼️ 导出图片</button>
<span class="spacer"></span>
<span style="font-size:12px;color:var(--yellow)">🟡 框选黄色区域</span>
</div>
<div id="main">
<div id="sidebar" class="hidden">
<div class="section-header" id="img-section-toggle">📋 图片列表 <span class="arrow">▼</span></div>
<div id="image-list"></div>
<div class="section-header" id="layer-section-toggle">📐 标注图层 <span class="arrow">▼</span> <span style="font-size:10px;color:var(--accent)" id="layer-count">0</span></div>
<div id="layer-list"></div>
<div id="layer-actions">
<button class="btn" id="btn-sel-all">全选</button>
<button class="btn" id="btn-sel-none">取消</button>
<button class="btn" id="btn-del-sel">删除选中</button>
</div>
</div>
<div id="canvas-wrap"><canvas id="canvas"></canvas><div id="drop-hint"><span class="big-icon">📷</span><span>拖拽图片到此处 或 点击加载</span><span style="font-size:12px;opacity:.6">支持 JPG / PNG / BMP / TIFF</span></div><div id="toast"></div></div>
</div>
<canvas id="magnifier" width="100" height="100"></canvas>
<div id="statusbar">
<span>图片: <span class="val" id="st-image">-</span></span>
<span>分辨率: <span class="val" id="st-size">-</span></span>
<span>多边形: <span class="val" id="st-poly">0</span></span>
<span>缩放: <span class="val" id="st-zoom">100%</span></span>
<span>坐标: <span class="val" id="st-pos">-</span></span>
<span>RGB: <span class="val" id="st-rgb">-</span></span>
</div>
<input type="file" id="file-input" hidden accept="image/*" multiple>
<input type="file" id="folder-input" hidden webkitdirectory directory multiple>
<script>
"use strict";
const PRESET_COLORS=["#f9e2af","#fab387","#f38ba8","#cba6f7","#89b4fa","#94e2d5","#a6e3a1","#f5c2e7","#ffffff","#ff79c6","#50fa7b","#8be9fd"];
const state={images:[],currentIdx:-1,polygons:[],currentPoly:null,selectedIndices:[],mode:"draw",activeColor:"#f9e2af",tolerance:25,zoom:1,panX:0,panY:0,panning:!1,panStart:{x:0,y:0},panStartPX:0,panStartPY:0,hoveredVertex:null,dragVertex:null,imageDataCache:null,_autoSelectNext:!1,showOutlines:!0,showLabels:!0,lineWidth:3,currentTab:"空鼓检查",isDirty:!1};
const canvas=document.getElementById("canvas"),ctx=canvas.getContext("2d"),wrap=document.getElementById("canvas-wrap");
const sidebar=document.getElementById("sidebar"),imageList=document.getElementById("image-list"),layerList=document.getElementById("layer-list");
const magnifier=document.getElementById("magnifier"),mctx=magnifier.getContext("2d");
function clamp(v,l,h){return Math.max(l,Math.min(h,v))}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function screenToImage(sx,sy){return{x:(sx-state.panX)/state.zoom,y:(sy-state.panY)/state.zoom}}
function showToast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show")},1800)}
function rgbToHex(r,g,b){return"#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1)}
function colorDistance(c1,c2){var rmean=(c1.r+c2.r)/2,dr=c1.r-c2.r,dg=c1.g-c2.g,db=c1.b-c2.b;return Math.sqrt((2+rmean/256)*dr*dr+4*dg*dg+(2+(255-rmean)/256)*db*db)}

// ===== 颜色选择器 =====
function buildColorPalette(){var c=document.getElementById("preset-colors");c.innerHTML="";PRESET_COLORS.forEach(function(clr){var d=document.createElement("div");d.className="color-dot";d.style.backgroundColor=clr;d.title=clr;if(clr===state.activeColor)d.classList.add("active-color");d.addEventListener("click",function(){selectColor(clr)});c.appendChild(d)})}
function selectColor(clr){state.activeColor=clr;document.getElementById("active-swatch").style.background=clr;document.getElementById("color-input").value=clr;buildColorPalette();if(state.selectedIndices.length>0){state.selectedIndices.forEach(function(i){state.polygons[i].color=clr});rebuildLayerPanel();render()}else if(state.mode==="edit"&&state.selectedIndices.length===0&&state.polygons.length>0&&state.hoveredPoly!==void 0){var pi=state.hoveredPoly;if(pi>=0){state.polygons[pi].color=clr;state.selectedIndices=[pi];rebuildLayerPanel();render()}}}
function applyColorToSelected(){if(state.selectedIndices.length>0){state.selectedIndices.forEach(function(i){state.polygons[i].color=state.activeColor});rebuildLayerPanel();render();showToast("已更新 "+state.selectedIndices.length+" 个线框")}else{showToast("请先选中线框")}}
document.getElementById("btn-color").addEventListener("click",function(e){e.stopPropagation();document.getElementById("color-popover").classList.toggle("show");buildColorPalette()});
document.getElementById("color-input").addEventListener("input",function(e){selectColor(e.target.value)});
document.getElementById("btn-apply-color").addEventListener("click",applyColorToSelected);
document.addEventListener("click",function(e){if(!document.getElementById("color-picker-wrap").contains(e.target))document.getElementById("color-popover").classList.remove("show")});
document.getElementById("tolerance-slider").addEventListener("input",function(){state.tolerance=parseInt(this.value);document.getElementById("tolerance-val").textContent=state.tolerance});document.getElementById("linewidth-slider").addEventListener("input",function(){state.lineWidth=parseInt(this.value);document.getElementById("linewidth-val").textContent=state.lineWidth;render()});

// ===== 像素读取 & 吸管 =====
function getPixelColor(ix,iy){if(!state.imageDataCache)return null;var w=state.images[state.currentIdx].width,idx=(Math.floor(iy)*w+Math.floor(ix))*4;if(idx<0||idx>=state.imageDataCache.data.length-3)return null;return{r:state.imageDataCache.data[idx],g:state.imageDataCache.data[idx+1],b:state.imageDataCache.data[idx+2]}}
function eyedropperPick(sx,sy){if(state._autoSelectNext){state._autoSelectNext=!1;autoSelectRegion(sx,sy);return}var pt=screenToImage(sx,sy),img=state.images[state.currentIdx];if(!img||pt.x<0||pt.y<0||pt.x>=img.width||pt.y>=img.height)return;var clr=getPixelColor(pt.x,pt.y);if(clr){selectColor(rgbToHex(clr.r,clr.g,clr.b));showToast("吸取: "+rgbToHex(clr.r,clr.g,clr.b))}}
function updateMagnifier(e){if(state.mode!=="eyedropper"||state.currentIdx<0){magnifier.style.display="none";return}var rect=canvas.getBoundingClientRect(),sx=e.clientX-rect.left,sy=e.clientY-rect.top,pt=screenToImage(sx,sy),img=state.images[state.currentIdx];if(!img||pt.x<0||pt.y<0||pt.x>=img.width||pt.y>=img.height){magnifier.style.display="none";return}magnifier.style.display="block";magnifier.style.left=(e.clientX-60)+"px";magnifier.style.top=(e.clientY-120)+"px";mctx.clearRect(0,0,100,100);mctx.drawImage(img.element,pt.x-10,pt.y-10,20,20,0,0,100,100);mctx.strokeStyle="#fff";mctx.lineWidth=1;mctx.beginPath();mctx.moveTo(50,0);mctx.lineTo(50,100);mctx.stroke();mctx.beginPath();mctx.moveTo(0,50);mctx.lineTo(100,50);mctx.stroke();mctx.strokeStyle="#000";mctx.lineWidth=2;mctx.strokeRect(46,46,8,8)}

// ===== 自动框选 =====
function rectOverlap(a,b){return!(a.maxX<=b.minX||a.minX>=b.maxX||a.maxY<=b.minY||a.minY>=b.maxY)}
function isOverlapping(r,polys){for(var i=0;i<polys.length;i++){var p=polys[i];if(p.type!=="rect")continue;var pr={minX:p.points[0].x,minY:p.points[0].y,maxX:p.points[1].x,maxY:p.points[2].y};if(rectOverlap(r,pr)){var ox=Math.max(0,Math.min(r.maxX,pr.maxX)-Math.max(r.minX,pr.minX)),oy=Math.max(0,Math.min(r.maxY,pr.maxY)-Math.max(r.minY,pr.minY)),oa=ox*oy,ra=(r.maxX-r.minX)*(r.maxY-r.minY),pa=(pr.maxX-pr.minX)*(pr.maxY-pr.minY);if(oa>0)return!0}}return!1}
function autoSelectRegion(sx,sy){var img=state.images[state.currentIdx];if(!img)return;var pt=screenToImage(sx,sy);if(pt.x<0||pt.y<0||pt.x>=img.width||pt.y>=img.height)return;var seedColor=getPixelColor(pt.x,pt.y);if(!seedColor)return;selectColor(rgbToHex(seedColor.r,seedColor.g,seedColor.b));showToast("扫描中...");setTimeout(function(){var t0=Date.now(),rects=findAllColorRegions(seedColor,state.tolerance);if(!rects||rects.length===0){showToast("未找到匹配区域");return}var added=0,addedRects=[];rects.forEach(function(r){var w=r.maxX-r.minX,h=r.maxY-r.minY;if(w<5&&h<5)return;if(isOverlapping(r,state.polygons)||isOverlapping(r,addedRects))return;var poly={points:[{x:r.minX,y:r.minY},{x:r.maxX,y:r.minY},{x:r.maxX,y:r.maxY},{x:r.minX,y:r.maxY}],color:state.activeColor,name:"区域 "+(state.polygons.length+1),type:"rect",visible:!0};state.polygons.push(poly);addedRects.push(r);added++});if(added>0){state.selectedIndices=[];for(var i=state.polygons.length-added;i<state.polygons.length;i++)state.selectedIndices.push(i);state.isDirty=!0}setMode("edit");rebuildLayerPanel();updateStatus();render();showToast("找到 "+added+" 个矩形 ("+(Date.now()-t0)+"ms)")},50)}
function findAllColorRegions(seedColor,tol){if(!state.imageDataCache)return null;var data=state.imageDataCache.data,w=state.images[state.currentIdx].width,h=state.images[state.currentIdx].height;var visited=new Uint8Array(w*h),rects=[],dirs=[-1,0,1,0,0,-1,0,1];for(var sy=0;sy<h;sy+=3){for(var sx=0;sx<w;sx+=3){var idx=sy*w+sx;if(visited[idx])continue;var i=idx*4,clr={r:data[i],g:data[i+1],b:data[i+2]};if(colorDistance(seedColor,clr)>tol)continue;var minX=sx,maxX=sx,minY=sy,maxY=sy;var queue=[sx,sy],qi=0;visited[idx]=1;while(qi<queue.length){var x=queue[qi++],y=queue[qi++];if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y;for(var d=0;d<4;d++){var nx=x+dirs[d*2],ny=y+dirs[d*2+1];if(nx<0||ny<0||nx>=w||ny>=h)continue;var nidx=ny*w+nx;if(visited[nidx])continue;visited[nidx]=1;var ni=nidx*4,nclr={r:data[ni],g:data[ni+1],b:data[ni+2]};if(colorDistance(seedColor,nclr)<=tol){queue.push(nx,ny)}}}var rw=maxX-minX,rh=maxY-minY;if(rw>=3&&rh>=3&&queue.length>=20)rects.push({minX:minX,minY:minY,maxX:maxX+1,maxY:maxY+1})}}return rects}

// ===== 图片加载 =====
function loadImages(files){var vf=Array.from(files).filter(function(f){return/\.(jpg|jpeg|png|bmp|tiff?|webp|gif)$/i.test(f.name)});if(!vf.length){showToast("无图片文件");return}state.images=[];state.currentIdx=-1;state.polygons=[];state.currentPoly=null;state.selectedIndices=[];state.imageDataCache=null;var loaded=0;vf.forEach(function(file){var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){state.images.push({name:file.name,src:e.target.result,width:img.width,height:img.height,element:img});loaded++;if(loaded===vf.length){state.images.sort(function(a,b){return a.name.localeCompare(b.name)});rebuildSidebar();switchToImage(0);fitToScreen();document.getElementById("drop-hint").classList.add("hidden");showToast("已加载 "+state.images.length+" 张")}};img.src=e.target.result};r.readAsDataURL(file)})}
function rebuildSidebar(){imageList.innerHTML="";layerList.innerHTML="";sidebar.classList.remove("hidden");var multi=state.images.length>1;document.getElementById("img-section-toggle").style.display=multi?"":"none";document.getElementById("image-list").style.display=multi?"":"none";state.images.forEach(function(img,i){var d=document.createElement("div");d.className="thumb-item";var dot=document.createElement("span");var anno=img._categories?img._categories[state.currentTab]:null;var has=anno&&anno.length>0;dot.className="thumb-dot "+(has?"done":"empty");var nm=document.createElement("span");nm.className="thumb-name";nm.textContent=img.name;var bd=document.createElement("span");bd.className="thumb-badge";bd.textContent=has?anno.length:0;d.appendChild(dot);d.appendChild(nm);d.appendChild(bd);(function(idx){d.addEventListener("click",function(){switchToImage(idx)})})(i);imageList.appendChild(d)});rebuildLayerPanel()}
function saveCurrentAnnotations(){if(state.currentIdx<0)return;var img=state.images[state.currentIdx];if(!img._categories)img._categories={};img._categories[state.currentTab]=JSON.parse(JSON.stringify(state.polygons));state.isDirty=!1}function loadAnnotationsForTab(){var img=state.images[state.currentIdx];if(!img)return[];if(!img._categories)img._categories={};return img._categories[state.currentTab]?JSON.parse(JSON.stringify(img._categories[state.currentTab])):[]}function switchToImage(idx){if(idx<0||idx>=state.images.length)return;saveCurrentAnnotations();state.currentIdx=idx;state.polygons=loadAnnotationsForTab();state.currentPoly=null;state.selectedIndices=[];state.imageDataCache=null;state.isDirty=!1;updateSidebarSelection(idx);rebuildLayerPanel();updateStatus();render();setTimeout(cacheImageData,100)}
function cacheImageData(){var img=state.images[state.currentIdx];if(!img)return;var off=document.createElement("canvas");off.width=img.width;off.height=img.height;var octx=off.getContext("2d");odocument.getElementById("drop-hint").classList.add("hidden");ctx.drawImage(img.element,0,0);try{state.imageDataCache=octx.getImageData(0,0,img.width,img.height)}catch(e){state.imageDataCache=null}}

// ===== 多边形操作 =====
function addVertex(sx,sy){var pt=screenToImage(sx,sy);if(!state.currentPoly){state.currentPoly={points:[pt],color:state.activeColor}}else{var f=state.currentPoly.points[0];if(state.currentPoly.points.length>=2&&dist(pt,f)<12/state.zoom){closePolygon();return}state.currentPoly.points.push(pt)}render()}
function closePolygon(){if(!state.currentPoly||state.currentPoly.points.length<3){state.currentPoly=null;render();return}state.polygons.push({points:[].concat(state.currentPoly.points),color:state.currentPoly.color||state.activeColor,name:"区域 "+(state.polygons.length+1),visible:!0});state.currentPoly=null;state.selectedIndices=[state.polygons.length-1];state.isDirty=!0;rebuildLayerPanel();updateStatus();render()}
function undoVertex(){if(!state.currentPoly)return;if(state.currentPoly.points.length<=1)state.currentPoly=null;else state.currentPoly.points.pop();render()}
function deleteSelectedPolygons(){if(state.selectedIndices.length===0)return;state.selectedIndices.sort(function(a,b){return b-a});state.selectedIndices.forEach(function(i){state.polygons.splice(i,1)});state.selectedIndices=[];state.isDirty=!0;rebuildLayerPanel();updateStatus();render()}
function findPolygonAt(sx,sy){var pt=screenToImage(sx,sy);for(var i=state.polygons.length-1;i>=0;i--){if(state.polygons[i].visible===!1)continue;if(pointInPolygon(pt,state.polygons[i].points))return i}return-1}
function pointInPolygon(pt,pts){var inside=!1;for(var i=0,j=pts.length-1;i<pts.length;j=i++){var xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y;if((yi>pt.y)!==(yj>pt.y)&&pt.x<(xj-xi)*(pt.y-yi)/(yj-yi)+xi)inside=!inside}return inside}
function findVertexAt(sx,sy){var pt=screenToImage(sx,sy),th=10/state.zoom;for(var pi=0;pi<state.polygons.length;pi++){if(state.polygons[pi].visible===!1)continue;for(var vi=0;vi<state.polygons[pi].points.length;vi++)if(dist(pt,state.polygons[pi].points[vi])<th)return{polyIdx:pi,vertIdx:vi}}if(state.currentPoly)for(var vi=0;vi<state.currentPoly.points.length;vi++)if(dist(pt,state.currentPoly.points[vi])<th)return{polyIdx:-1,vertIdx:vi};return null}

// ===== 平滑曲线 =====
function drawSmoothPolygon(ctx,pts){if(pts.length<3){ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.closePath();return}ctx.beginPath();var n=pts.length;function get(i){return pts[(i+n)%n]}ctx.moveTo(pts[0].x,pts[0].y);for(var i=0;i<n;i++){var p0=get(i-1),p1=get(i),p2=get(i+1),p3=get(i+2);for(var t=0;t<12;t++){var t2=(t+1)/12,t3=t2*t2,t4=t3*t2;var mx=.5*(2*p1.x+(p2.x-p0.x)*t2+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t3+(3*p1.x-p0.x-3*p2.x+p3.x)*t4);var my=.5*(2*p1.y+(p2.y-p0.y)*t2+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t3+(3*p1.y-p0.y-3*p2.y+p3.y)*t4);ctx.lineTo(mx,my)}}ctx.closePath()}

// ===== 渲染 =====
function render(){var img=state.images[state.currentIdx];if(!img){canvas.width=wrap.clientWidth;canvas.height=wrap.clientHeight;ctx.clearRect(0,0,canvas.width,canvas.height);return}canvas.width=wrap.clientWidth;canvas.height=wrap.clientHeight;ctx.clearRect(0,0,canvas.width,canvas.height);ctx.save();ctx.translate(state.panX,state.panY);ctx.scale(state.zoom,state.zoom);document.getElementById("drop-hint").classList.add("hidden");ctx.drawImage(img.element,0,0);
state.polygons.forEach(function(poly,pi){if(poly.points.length<2)return;if(poly.visible===!1)return;var pts=poly.points,sel=state.selectedIndices.indexOf(pi)>=0,pc=poly.color||"#f9e2af",isRect=poly.type==="rect";if(state.showOutlines){if(isRect){ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.closePath()}else{drawSmoothPolygon(ctx,pts)}ctx.fillStyle=pc+"30";ctx.fill();ctx.strokeStyle=sel?"#fff":pc;ctx.lineWidth=(sel?state.lineWidth+1:state.lineWidth)/state.zoom;ctx.lineJoin="round";ctx.stroke()}if(state.zoom>0.5&&state.showOutlines&&!isRect)pts.forEach(function(p){var r=4/state.zoom;ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fillStyle=sel?"#fff":pc;ctx.fill();ctx.strokeStyle="#1e1e2e";ctx.lineWidth=1.5/state.zoom;ctx.stroke()});if(pts.length>0&&state.zoom>0.3&&state.showLabels){ctx.font=(12/state.zoom)+"px \"Segoe UI\"";ctx.fillStyle="#fff";ctx.strokeStyle="#1e1e2e";ctx.lineWidth=3/state.zoom;var lbl=poly.name||"";ctx.strokeText(lbl,pts[0].x+8/state.zoom,pts[0].y-4/state.zoom);ctx.fillText(lbl,pts[0].x+8/state.zoom,pts[0].y-4/state.zoom)}});
if(state.currentPoly&&state.currentPoly.points.length>0){var pts=state.currentPoly.points,pc=state.currentPoly.color||state.activeColor;ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.strokeStyle=pc;ctx.lineWidth=state.lineWidth/state.zoom;ctx.setLineDash([6/state.zoom,4/state.zoom]);ctx.stroke();ctx.setLineDash([]);pts.forEach(function(p,i){var r=5/state.zoom;ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fillStyle=i===0?"#a6e3a1":pc;ctx.fill();ctx.strokeStyle="#1e1e2e";ctx.lineWidth=1.5/state.zoom;ctx.stroke()});if(pts.length>=2){var f=pts[0];ctx.beginPath();ctx.arc(f.x,f.y,8/state.zoom,0,Math.PI*2);ctx.strokeStyle="#a6e3a1";ctx.lineWidth=2/state.zoom;ctx.setLineDash([3/state.zoom,3/state.zoom]);ctx.stroke();ctx.setLineDash([])}}
if(state.mode==="edit"&&state.hoveredVertex){var hv=state.hoveredVertex,pt;if(hv.polyIdx>=0&&state.polygons[hv.polyIdx].visible!==!1)pt=state.polygons[hv.polyIdx].points[hv.vertIdx];else if(state.currentPoly)pt=state.currentPoly.points[hv.vertIdx];if(pt){var r=8/state.zoom;ctx.beginPath();ctx.arc(pt.x,pt.y,r,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();ctx.strokeStyle="#89b4fa";ctx.lineWidth=2/state.zoom;ctx.stroke()}}ctx.restore();updateStatus()}
function updateStatus(){var img=state.images[state.currentIdx];document.getElementById("st-image").textContent=img?img.name:"-";document.getElementById("st-size").textContent=img?img.width+"x"+img.height:"-";document.getElementById("st-poly").textContent=state.polygons.length;document.getElementById("st-zoom").textContent=Math.round(state.zoom*100)+"%"}

// ===== 缩放平移 =====
function fitToScreen(){var img=state.images[state.currentIdx];if(!img)return;var pw=wrap.clientWidth-40,ph=wrap.clientHeight-40;state.zoom=Math.min(pw/img.width,ph/img.height,1);state.panX=(wrap.clientWidth-img.width*state.zoom)/2;state.panY=(wrap.clientHeight-img.height*state.zoom)/2;render()}
function zoomAt(sx,sy,factor){var oz=state.zoom;state.zoom=clamp(state.zoom*factor,0.1,20);state.panX=sx-(sx-state.panX)*(state.zoom/oz);state.panY=sy-(sy-state.panY)*(state.zoom/oz);render()}
function setMode(m){state.mode=m;document.getElementById("btn-draw").classList.toggle("active",m==="draw");document.getElementById("btn-edit").classList.toggle("active",m==="edit");document.getElementById("btn-eyedropper").classList.toggle("active",m==="eyedropper");wrap.classList.remove("eyedropper");if(m==="draw"||m==="eyedropper")canvas.style.cursor="crosshair";else canvas.style.cursor="default";if(m==="eyedropper")wrap.classList.add("eyedropper");magnifier.style.display="none"}

// ===== 事件 =====
canvas.addEventListener("mousedown",function(e){var rect=canvas.getBoundingClientRect(),sx=e.clientX-rect.left,sy=e.clientY-rect.top;if(e.button===1||(e.button===0&&e.ctrlKey)){state.panning=!0;state.panStart={x:e.clientX,y:e.clientY};state.panStartPX=state.panX;state.panStartPY=state.panY;wrap.classList.add("panning");return}if(e.button!==0)return;if(state.mode==="eyedropper"){eyedropperPick(sx,sy);setMode("draw");return}if(state.mode==="draw"){addVertex(sx,sy)}else if(state.mode==="edit"){var hv=findVertexAt(sx,sy);if(hv){state.dragVertex=hv;return}var pi=findPolygonAt(sx,sy);if(e.ctrlKey||e.metaKey){var idx=state.selectedIndices.indexOf(pi);if(idx>=0)state.selectedIndices.splice(idx,1);else if(pi>=0)state.selectedIndices.push(pi)}else{state.selectedIndices=pi>=0?[pi]:[]}if(pi>=0){var sc=state.polygons[pi].color||"#f9e2af";if(sc!==state.activeColor){state.activeColor=sc;document.getElementById("active-swatch").style.background=sc;document.getElementById("color-input").value=sc;buildColorPalette()}}rebuildLayerPanel();render()}});
canvas.addEventListener("mousemove",function(e){var rect=canvas.getBoundingClientRect(),sx=e.clientX-rect.left,sy=e.clientY-rect.top,pt=screenToImage(sx,sy);document.getElementById("st-pos").textContent=pt.x.toFixed(0)+", "+pt.y.toFixed(0);var clr=getPixelColor(pt.x,pt.y);if(clr)document.getElementById("st-rgb").textContent="R:"+clr.r+" G:"+clr.g+" B:"+clr.b;if(state.mode==="eyedropper")updateMagnifier(e);if(state.panning){state.panX=state.panStartPX+(e.clientX-state.panStart.x);state.panY=state.panStartPY+(e.clientY-state.panStart.y);render();return}if(state.dragVertex){if(state.dragVertex.polyIdx>=0)state.polygons[state.dragVertex.polyIdx].points[state.dragVertex.vertIdx]=pt;else if(state.currentPoly)state.currentPoly.points[state.dragVertex.vertIdx]=pt;render();return}if(state.mode==="edit"){var hv=findVertexAt(sx,sy);if(JSON.stringify(hv)!==JSON.stringify(state.hoveredVertex)){state.hoveredVertex=hv;render()}canvas.style.cursor=hv?"pointer":"default"}});

document.addEventListener("keydown",function(e){if(e.target.tagName==="INPUT")return;switch(e.key.toLowerCase()){case"d":setMode("draw");break;case"e":setMode("edit");break;case"i":setMode("eyedropper");break;case"h":document.getElementById("btn-toggle-outline").click();break;case"l":document.getElementById("btn-toggle-label").click();break;case"delete":deleteSelectedPolygons();break;case"enter":if(state.mode==="draw"&&state.currentPoly&&state.currentPoly.points.length>=3)closePolygon();break;case"escape":state.currentPoly=null;state.selectedIndices=[];setMode("draw");rebuildLayerPanel();render();break;case"z":if(e.ctrlKey){e.preventDefault();undoVertex()}break;case"0":fitToScreen();break;case"+":case"=":zoomAt(wrap.clientWidth/2,wrap.clientHeight/2,1.2);break;case"-":zoomAt(wrap.clientWidth/2,wrap.clientHeight/2,0.8);break;case"s":if(e.ctrlKey){e.preventDefault();exportAnnotations()}break;case"o":if(e.ctrlKey){e.preventDefault();document.getElementById("file-input").click()}break;case"a":if(e.ctrlKey){e.preventDefault();state.selectedIndices=state.polygons.map(function(_,i){return i});rebuildLayerPanel();render()}break;case"arrowleft":if(state.currentIdx>0)switchToImage(state.currentIdx-1);break;case"arrowright":if(state.currentIdx<state.images.length-1)switchToImage(state.currentIdx+1);break}});

// ===== 按钮绑定 =====

function switchTab(tab){if(tab===state.currentTab)return;if(state.isDirty&&state.polygons.length>0){if(confirm("当前有未保存的标注，\n确定=保存并切换\n取消=不保存直接切换")){saveCurrentAnnotations()}}else{saveCurrentAnnotations()}state.currentTab=tab;document.getElementById("nav-konggu").classList.toggle("active",tab==="空鼓检查");document.getElementById("nav-liefeng").classList.toggle("active",tab==="裂缝检查");var c=tab==="空鼓检查"?"#f38ba8":"#89b4fa";state.activeColor=c;document.getElementById("active-swatch").style.background=c;document.getElementById("color-input").value=c;buildColorPalette();state.polygons=loadAnnotationsForTab();state.selectedIndices=[];state.currentPoly=null;state.isDirty=!1;rebuildLayerPanel();updateStatus();render();showToast(tab+"模式")}document.getElementById("nav-konggu").addEventListener("click",function(){switchTab("空鼓检查")});document.getElementById("nav-liefeng").addEventListener("click",function(){switchTab("裂缝检查")});window.addEventListener("resize",render);

// ===== 导出图片 =====
function exportImage(){saveCurrentAnnotations();var img=state.images[state.currentIdx];if(!img)return;var oc=document.createElement("canvas");oc.width=img.width;oc.height=img.height;var octx=oc.getContext("2d");odocument.getElementById("drop-hint").classList.add("hidden");ctx.drawImage(img.element,0,0);state.polygons.forEach(function(poly){if(poly.points.length<2||poly.visible===!1)return;var pts=poly.points,pc=poly.color||"#f9e2af",isRect=poly.type==="rect";octx.save();if(isRect){octx.beginPath();octx.moveTo(pts[0].x,pts[0].y);for(var i=1;i<pts.length;i++)octx.lineTo(pts[i].x,pts[i].y);octx.closePath()}else{drawSmoothPolygon(octx,pts)}octx.globalAlpha=0.2;octx.fillStyle=pc;octx.fill();octx.globalAlpha=1;octx.strokeStyle=pc;octx.lineWidth=Math.max(state.lineWidth,img.width/1500);octx.lineJoin="round";octx.stroke();octx.restore()});var url=oc.toDataURL("image/png"),a=document.createElement("a");a.href=url;a.download=img.name.replace(/\.[^.]+$/,"")+"_标注.png";a.click();showToast("图片已导出")}

// ===== 导出 =====
function exportAnnotations(){if(state.currentIdx>=0){saveCurrentAnnotations()}var ed=state.images.map(function(img){return{image:img.name,width:img.width,height:img.height,polygons:Object.keys(img._categories||{}).reduce(function(acc,cat){return acc.concat((img._categories[cat]||[]).map(function(p){return{name:p.name,color:p.color,visible:p.visible,type:p.type,category:cat,points:p.points}}))},[])}});var json=JSON.stringify(ed,null,2),blob=new Blob([json],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="annotations_"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(url);rebuildSidebar();showToast("导出完成")}
function init(){canvas.width=wrap.clientWidth;canvas.height=wrap.clientHeight;buildColorPalette();render()}
