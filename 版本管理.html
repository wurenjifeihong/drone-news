<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>版本管理 - 无人机影像标注工具</title>
<style>
:root{--bg:#0f0f1a;--card:#1a1a2e;--border:#2a2a40;--text:#cdd6f4;--text2:#a6adc8;--accent:#89b4fa;--green:#a6e3a1;--red:#f38ba8;--yellow:#f9e2af}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:40px}
.header{text-align:center;margin-bottom:40px}
.header h1{font-size:28px;color:var(--accent);margin-bottom:8px}
.header p{color:var(--text2);font-size:14px}
.timeline{max-width:700px;margin:0 auto;position:relative}
.timeline::before{content:"";position:absolute;left:24px;top:0;bottom:0;width:2px;background:var(--border)}
.version-card{position:relative;margin-bottom:24px;padding-left:60px}
.version-card::before{content:"";position:absolute;left:15px;top:16px;width:20px;height:20px;border-radius:50%;background:var(--accent);border:3px solid var(--bg);z-index:1}
.version-card.latest::before{background:var(--green);box-shadow:0 0 12px var(--green)}
.card-inner{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.card-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.version-tag{background:var(--accent);color:var(--bg);padding:3px 10px;border-radius:12px;font-weight:700;font-size:13px}
.version-date{color:var(--text2);font-size:12px}
.version-bump{padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600}
.version-bump.major{background:var(--red);color:#fff}
.version-bump.minor{background:var(--yellow);color:var(--bg)}
.version-bump.patch{background:var(--green);color:var(--bg)}
.card-body{font-size:14px;line-height:1.7;color:var(--text)}
.card-body ul{padding-left:20px;margin:8px 0}
.card-body li{margin:4px 0}
.card-body li::marker{color:var(--accent)}
.note-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.note-section textarea{width:100%;min-height:50px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px;font-size:13px;resize:vertical;font-family:inherit}
.note-section textarea:focus{outline:none;border-color:var(--accent)}
.note-actions{display:flex;gap:8px;margin-top:6px;justify-content:flex-end}
.note-actions button{padding:5px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:12px;transition:all .15s}
.note-actions button:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.note-actions button.save{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.note-saved{font-size:11px;color:var(--green)}
.toolbar{max-width:700px;margin:0 auto 30px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.toolbar button{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:13px}
.toolbar button:hover{background:var(--accent);color:var(--bg)}
.toolbar .spacer{flex:1}
.stats{display:flex;gap:16px;font-size:13px;color:var(--text2)}
.stats span{color:var(--accent);font-weight:600}
.empty{text-align:center;color:var(--text2);padding:60px;font-size:15px}
</style>
</head>
<body>

<div class="toolbar">
  <button onclick="window.open('标注工具.html','_blank')">🔧 打开标注工具</button>
  <span class="spacer"></span>
  <span class="stats">版本数: <span id="stat-count">0</span></span>
</div>

<div class="header">
  <h1>📋 版本管理</h1>
  <p>无人机影像标注工具 · 更新日志</p>
</div>

<div class="timeline" id="timeline"></div>

<script>
const NOTES_KEY = "drone_anno_version_notes";
const VERSIONS = [
  {ver:"1.12.0",date:"2026-06-15",bump:"minor",changes:["新增粘结强度检测模块：放置测点、录入强度值、JGJ/T 110自动判定"]},

  {ver:"1.11.2",date:"2026-06-03",bump:"patch",changes:["批量框选旧方案兼容：缺失mode时默认AI"]},

  {ver:"1.11.1",date:"2026-06-03",bump:"patch",changes:["批量导出自动命名：年月日-序号_标注.png，无需逐个确认"]},

  {ver:"1.11.0",date:"2026-06-03",bump:"minor",changes:["新增批量导出：遍历所有已标注图片逐张导出PNG，支持选择保存路径"]},

  {ver:"1.10.1",date:"2026-06-03",bump:"patch",changes:["修复擦除框选坐标：改为图像坐标系，跟随鼠标准确绘制虚线框"]},

  {ver:"1.10.0",date:"2026-06-03",bump:"minor",changes:["擦除模式支持拖拽框选批量删除：拖动画矩形框选中多个图层一次性删除"]},

  {ver:"1.9.2",date:"2026-06-03",bump:"patch",changes:["方案选择器增加删除按钮"]},

  {ver:"1.9.1",date:"2026-06-03",bump:"patch",changes:["保存方案改用数字选择模式：1=自动(矩形) 2=AI(平滑)，默认AI"]},

  {ver:"1.9.0",date:"2026-06-03",bump:"minor",changes:["批量框选支持自动(矩形)和AI(平滑)两种模式，方案列表显示模式标签"]},

  {ver:"1.8.4",date:"2026-06-03",bump:"patch",changes:["修复批量框选：去除竞态cacheImageData，增加300ms等待和逐张渲染展示"]},

  {ver:"1.8.3",date:"2026-06-02",bump:"patch",changes:["彻底修复PowerShell here-string导致的''引号残留，清理重复代码碎片"]},

  {ver:"1.8.2",date:"2026-06-02",bump:"patch",changes:["修复rebuildPlanSelector中PowerShell here-string导致的''引号语法错误"]},

  {ver:"1.8.1",date:"2026-06-02",bump:"patch",changes:["修复batchProcess中switchImage->switchToImage函数名错误"]},

  {ver:"1.8.0",date:"2026-06-02",bump:"minor",changes:["新增方案管理：保存框选参数为方案，批量对所有图片应用方案框选，localStorage持久化"]},

  {ver:"1.7.3",date:"2026-06-02",bump:"patch",changes:["紧急修复：恢复被误删的loadImages/rebuildSidebar等核心函数"]},

  {ver:"1.7.2",date:"2026-06-02",bump:"patch",changes:["热成像适配：基于亮度温度特征识别高温空调外机+低温窗户，框选自动排除"]},

  {ver:"1.7.1",date:"2026-06-02",bump:"patch",changes:["框选路径默认排除AI识别的空调/窗户区域，避免重复标注"]},

  {ver:"1.7.0",date:"2026-06-02",bump:"minor",changes:["新增AI识别：基于边缘检测+形状纹理特征识别空调外机(红色)和窗户(蓝色)"]},

  {ver:"1.6.0",date:"2026-06-02",bump:"minor",changes:["泛框选：基于颜色蒙版+形态学膨胀弥合间隙，适配分散不连续的颜色区域"]},

  {ver:"1.5.3",date:"2026-06-02",bump:"patch",changes:["导出图片支持选择保存路径(showSaveFilePicker)，修复exportImage/cacheImageData的ctx/odocument bug"]},

  {ver:"1.5.2",date:"2026-06-02",bump:"patch",changes:["新增擦除模式：点击路径直接删除，悬停红色高亮"]},

  {ver:"1.5.1",date:"2026-06-02",bump:"patch",changes:["多色区域取并集：重叠矩形合并、AI像素级合并取最大轮廓"]},

  {ver:"1.5.0",date:"2026-06-02",bump:"minor",changes:["吸管支持多次取色，预览框多色展示，自动/AI框选遍历所有吸取的颜色"]},

  {ver:"1.4.2",date:"2026-06-01",bump:"patch",changes:["AI框选完成后光标恢复默认查看状态"]},

  {ver:"1.4.1",date:"2026-06-01",bump:"patch",changes:["AI框选线框移除顶点圆点，仅保留圆滑线路"]},

  {ver:"1.4.0",date:"2026-06-01",bump:"minor",changes:["新增AI框选：轮廓追踪+DouglasPeucker简化+CatmullRom平滑曲线"]},

  {ver:"1.3.0",date:"2026-06-01",bump:"minor",changes:["【矩形线框版本】自动框选生成矩形线框，吸管同步取色，无异步缓存依赖"]},

  {ver:"1.2.4",date:"2026-06-01",bump:"patch",changes:["吸管取色改为同步读取像素，移除异步缓存依赖"]},

  {ver:"1.2.3",date:"2026-06-01",bump:"patch",changes:["增强颜色预览框可见性：蓝色边框、最小宽度、backgroundColor修复"]},

  {ver:"1.2.2",date:"2026-06-01",bump:"patch",changes:["重写吸管流程：简化模式切换，try-catch保护缓存加载，空指针防护"]},

  {ver:"1.2.1",date:"2026-06-01",bump:"patch",changes:["修复吸管取色预览框显示；增加像素缓存未就绪提示"]},

  {ver:"1.2.0",date:"2026-06-01",bump:"minor",changes:["重构自动框选：吸管取色→调整参数→一键框选"]},

  {ver:"1.1.6",date:"2026-06-01",bump:"patch",changes:["修复吸管按钮未显示的问题"]},

  {ver:"1.1.5",date:"2026-06-01",bump:"patch",changes:["恢复吸管工具入口，独立取色与自动框选分离"]},

  {ver:"1.1.4",date:"2026-06-01",bump:"patch",changes:["修复自动框选：点击即进入吸管模式，像素数据延迟加载时提示"]},

  {ver:"1.1.3",date:"2026-06-01",bump:"patch",changes:["绘制和自动框选按钮闲置时与加载同色，点击后高亮"]},

  {ver:"1.1.2",date:"2026-06-01",bump:"patch",changes:["移除编辑和吸管按钮入口，简化工具栏"]},

  {ver:"1.1.1",date:"2026-06-01",bump:"patch",changes:["修复自动框选：优先点击点区域、自适应采样步长、降低最小区域阈值"]},

  {ver:"1.1.0",date:"2026-06-01",bump:"minor",changes:["新增版本管理平台；release脚本自动同步版本页"]},

  {ver:"1.0.1",date:"2026-06-01",bump:"patch",changes:["基线版本：完整功能体系"]},
  {ver:"1.0.0",date:"2026-06-01",bump:"major",changes:[
    "手绘多边形标注 + Catmull-Rom 平滑曲线",
    "自动框选：魔术棒颜色识别 + 矩形范围框选",
    "吸管取色 + 放大镜预览",
    "左侧图层面板：多选、批量改色、显隐切换",
    "按图片×类别双层存储标注（空鼓检查/裂缝检查）",
    "切换图片/类别自动保存，未保存提示",
    "导出 JSON + PNG 无损图片",
    "线宽 1~10 可调，线框/名称独立显隐",
    "容差滑块 0~100，颜色选择器",
    "重叠检测（零容忍）",
    "一级导航：空鼓检查/裂缝检查",
  ]}
];

function getNotes(){try{return JSON.parse(localStorage.getItem(NOTES_KEY)||"{}")}catch(e){return{}}}
function saveNotes(notes){localStorage.setItem(NOTES_KEY,JSON.stringify(notes))}
function getNote(ver){var n=getNotes();return n[ver]||""}
function setNote(ver,txt){var n=getNotes();n[ver]=txt;saveNotes(n)}

function render(){
  var t=document.getElementById("timeline");
  t.innerHTML="";
  document.getElementById("stat-count").textContent=VERSIONS.length;
  if(VERSIONS.length===0){t.innerHTML='<div class="empty">暂无版本记录</div>';return}

  VERSIONS.forEach(function(v,i){
    var bumpLabel={"major":"重大更新","minor":"功能新增","patch":"修复优化"}[v.bump]||v.bump;
    var note=getNote(v.ver);
    var div=document.createElement("div");
    div.className="version-card"+(i===0?" latest":"");
    div.innerHTML='<div class="card-inner">'+
      '<div class="card-header">'+
        '<span class="version-tag">v'+v.ver+'</span>'+
        '<span class="version-date">'+v.date+'</span>'+
        '<span class="version-bump '+v.bump+'">'+bumpLabel+'</span>'+
      '</div>'+
      '<div class="card-body"><ul>'+v.changes.map(function(c){return"<li>"+c+"</li>"}).join("")+"</ul></div>"+
      '<div class="note-section">'+
        '<textarea id="note-'+v.ver+'" placeholder="添加备注...">'+note+'</textarea>'+
        '<div class="note-actions">'+
          (note?'<span class="note-saved">已保存备注</span>':'')+
          '<button onclick="clearNote(\''+v.ver+'\')">清除</button>'+
          '<button class="save" onclick="saveNote(\''+v.ver+'\')">保存备注</button>'+
        '</div>'+
      '</div>'+
    '</div>';
    t.appendChild(div);
  });
}

function saveNote(ver){
  var txt=document.getElementById("note-"+ver).value;
  setNote(ver,txt);
  render();
}

function clearNote(ver){
  document.getElementById("note-"+ver).value="";
  setNote(ver,"");
  render();
}

render();
</script>
</body>
</html>
